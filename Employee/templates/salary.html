<!DOCTYPE html>
<html>
<head>
    <title>Add Salary</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#4facfe,#00f2fe);
        }

        .container{
            width:500px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        form p{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#555;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:15px;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#007bff;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#218838;
        }

        .back-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Add Salary</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Save Salary
        </button>

    </form>

    <a href="{% url 'Salary_list' %}" class="back-btn">
        View Salary List
    </a>

</div>

</body>
</html>
