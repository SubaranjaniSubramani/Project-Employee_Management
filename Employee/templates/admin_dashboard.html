<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(to right,#4facfe,#00f2fe);
            min-height:100vh;
        }

        .container{
            width:90%;
            margin:auto;
            padding-top:50px;
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:40px;
        }

        .dashboard{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);
        }

        .card h2{
            margin-bottom:15px;
        }

        .card a{
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:10px 20px;
            border-radius:8px;
            display:inline-block;
            margin-top:10px;
        }

        .card a:hover{
            background:#0056b3;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Admin Dashboard</h1>

        <div class="dashboard">

            <div class="card">
                <h2>Add Employee</h2>
                <a href="{% url 'Add_employee' %}">
                    Open
                </a>
            </div>

            <div class="card">
                <h2>View Employees</h2>
                <a href="{% url 'Employee_list' %}">
                    Open
                </a>
            </div>

            <div class="card">
                <h2>Attendance</h2>
                <a href="{% url 'Attendance_list' %}">
                    Open
                </a>
            </div>

            <div class="card">
                <h2>Salary Details</h2>
                <a href="{% url 'Salary_list'%}">
                    Open
                </a>
            </div>

            <div class="card">
                <h2>Leave Requests</h2>
                <a href="{% url  'Leave_list' %}">
                    Open
                </a>
            </div>

            <div class="card">
                <h2>Logout</h2>
                <a href="{ % url  'Logout'% }">
                    Logout
                </a>
            </div>

        </div>

    </div>

</body>
</html>
