<!DOCTYPE html>
<html>
<head>
    <title>Update Employee</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(to right,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        form p{
            margin-bottom:15px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#ffc107;
            color:black;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#e0a800;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Update Employee</h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Update Employee
            </button>

        </form>

    </div>

</body>
</html>
