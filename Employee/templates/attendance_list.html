<!DOCTYPE html>
<html>
<head>
    <title>Attendance List</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        h2{
            background:#007bff;
            color:white;
            padding:10px;
            width:250px;
            margin-top:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            margin-bottom:20px;
        }

        th{
            background:grey;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

    </style>

</head>
<body>

<h1>Attendance List</h1>

{% for d in dates %}

<h2>Date : {{ d }}</h2>

<table>

    <tr>
        <th>Employee Name</th>
        <th>Status</th>
    </tr>

    {% for a in attendance %}

        {% if a.date == d %}

        <tr>

            <td>{{ a.employee.name }}</td>

            <td>{{ a.status }}</td>

        </tr>

        {% endif %}

    {% endfor %}

</table>

{% endfor %}

</body>
</html>
