<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#4facfe,#00f2fe);
        }

        .login-container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#007bff;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>
<body>

<div class="login-container">

    <h1>Admin Login</h1>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text"
                   name="username"
                   placeholder="Enter Username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Enter Password">
        </div>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
