<!DOCTYPE html>
<html>
<head>
    <title>Add Attendance</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#4facfe,#00f2fe);
        }

        .container{
            width:500px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#555;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:15px;
        }

        input:focus,
        select:focus{
            border-color:#007bff;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#0056b3;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:15px;
            font-weight:bold;
        }

        .back-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Add Attendance</h1>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Employee</label>
            {{ form.employee }}
        </div>

        <div class="form-group">
            <label>Date</label>
            {{ form.date }}
        </div>

        <div class="form-group">
            <label>Status</label>
            {{ form.status }}
        </div>

        <button type="submit" class="btn">
            Save Attendance
        </button>

    </form>

    <a href="{% url 'Attendance_list' %}" class="back-btn">
        View Attendance List
    </a>

</div>

</body>
</html>
